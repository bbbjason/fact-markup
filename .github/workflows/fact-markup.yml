name: Fact Markup

on:
  workflow_dispatch:
    inputs:
      url:
        description: Article URL to fetch and mark
        required: false
        type: string
      input_file:
        description: Existing Markdown path in the repository
        required: false
        type: string
      output_dir:
        description: Output directory for fetched articles
        required: false
        default: output
        type: string
      commit_outputs:
        description: Commit generated files back to the branch
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - .fact-markup-url

jobs:
  fact-markup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-fact-markup.txt

      - name: Run fact markup
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL || 'mistral-medium-latest' }}
          FACT_MARKUP_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.url || '' }}
          FACT_MARKUP_INPUT_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.input_file || '' }}
          FACT_MARKUP_OUTPUT_DIR: ${{ github.event_name == 'workflow_dispatch' && inputs.output_dir || 'output' }}
        run: |
          args=()
          if [ -z "$FACT_MARKUP_URL" ] && [ -f ".fact-markup-url" ]; then
            FACT_MARKUP_URL="$(head -n 1 .fact-markup-url | tr -d '\r\n')"
          fi
          if [ -z "$FACT_MARKUP_URL" ] && [ -z "$FACT_MARKUP_INPUT_FILE" ]; then
            echo "::error::Fill either Article URL or Existing Markdown path."
            exit 1
          fi
          if [ -n "$FACT_MARKUP_URL" ]; then
            if [[ ! "$FACT_MARKUP_URL" =~ ^https?:// ]]; then
              echo "::error::Article URL must start with http:// or https://. Paste only the article URL, not a traceback or previous error log."
              exit 1
            fi
            args+=(--url "$FACT_MARKUP_URL")
          fi
          if [ -n "$FACT_MARKUP_INPUT_FILE" ]; then
            args+=(--input-file "$FACT_MARKUP_INPUT_FILE")
          fi
          args+=(--output-dir "$FACT_MARKUP_OUTPUT_DIR")

          attempt=1
          until python scripts/fact_markup.py "${args[@]}"; do
            status=$?
            if [ "$attempt" -ge 3 ]; then
              exit "$status"
            fi
            delay=$((attempt * 20))
            echo "::warning::fact markup failed on attempt $attempt; retrying in ${delay}s."
            sleep "$delay"
            attempt=$((attempt + 1))
          done

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fact-markup-output
          path: |
            ${{ github.event_name == 'workflow_dispatch' && inputs.output_dir || 'output' }}/
            **/*.fact-marked.md
            **/*.judgments.jsonl

      - name: Commit generated files
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.commit_outputs }}
        env:
          FACT_MARKUP_OUTPUT_DIR: ${{ github.event_name == 'workflow_dispatch' && inputs.output_dir || 'output' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FACT_MARKUP_OUTPUT_DIR" scripts/fact_markup.py requirements-fact-markup.txt .github/workflows/fact-markup.yml
          git add -- '*.fact-marked.md' '*.judgments.jsonl'
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Add fact-markup automation output"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push
